services:
  - type: web
    name: pocket-sudoku
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: ADFIT_ENABLED
        sync: false
      - key: ADFIT_ALLOWED_HOSTS
        sync: false
      - key: ADFIT_GAME_DESKTOP_UNIT
        sync: false
      - key: ADFIT_GAME_MOBILE_UNIT
        sync: false
      - key: ADFIT_GAME_MOBILE_320X50_UNIT
        sync: false
      - key: ADFIT_GUIDE_DESKTOP_UNIT
        sync: false
      - key: ADFIT_GUIDE_MOBILE_UNIT
        sync: false
      - key: ADFIT_GAME_MOBILE_VARIANT
        sync: false
      - key: ADFIT_DESKTOP_HERO_MIN_WIDTH
        sync: false
      - key: ADFIT_MOBILE_MAX_WIDTH
        sync: false
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /_astro/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /icon-*.png
        name: Cache-Control
        value: public, max-age=604800
